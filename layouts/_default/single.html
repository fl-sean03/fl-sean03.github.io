{{ define "main" }}
<article class="article">
  <header class="article-header">
    <h1>{{ .Title }}</h1>
    {{ with .Params.subtitle }}<p class="subtitle">{{ . }}</p>{{ end }}
    {{ if .Date }}<time class="date">{{ .Date.Format "January 2006" }}</time>{{ end }}
  </header>
  {{ with .Params.image }}
  <figure class="featured-image"{{ with $.Params.heroAspect }} style="aspect-ratio: {{ . }};"{{ end }}>
    <img src="{{ . }}" alt="{{ $.Title }}">
  </figure>
  {{ end }}
  <div class="article-content">
    {{ .Content }}
  </div>
</article>
{{ end }}
